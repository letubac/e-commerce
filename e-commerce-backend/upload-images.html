<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Product Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        .file-upload {
            border: 3px dashed #e0e0e0;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        .file-upload:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .file-upload.dragover {
            border-color: #667eea;
            background: #e8ecff;
        }
        input[type="file"] {
            display: none;
        }
        .file-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .file-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 10px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .uploaded-images {
            margin-top: 20px;
        }
        .uploaded-image {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        .uploaded-image img {
            max-width: 150px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .copy-btn {
            margin-top: 5px;
            padding: 5px 10px;
            font-size: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Upload Product Images</h1>
        
        <!-- Login Section -->
        <div id="loginSection">
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="email" value="admin@ecommerce.com" placeholder="Enter admin email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="admin123" placeholder="Enter password">
            </div>
            <button class="btn" onclick="login()">🔐 Login</button>
        </div>

        <!-- Upload Section (hidden until logged in) -->
        <div id="uploadSection" style="display: none;">
            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="products">Products</option>
                    <option value="categories">Categories</option>
                    <option value="brands">Brands</option>
                    <option value="users">Users</option>
                </select>
            </div>

            <div class="form-group">
                <div class="file-upload" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div class="file-icon">📁</div>
                    <p>Click to browse or drag & drop files here</p>
                    <small>Supports: JPG, PNG, GIF, WEBP (Max: 10MB)</small>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles(this.files)">
            </div>

            <div class="file-list" id="fileList"></div>

            <button class="btn" id="uploadBtn" onclick="uploadFiles()" disabled>⬆️ Upload Files</button>
            <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
        </div>

        <div class="result" id="result"></div>
        <div class="uploaded-images" id="uploadedImages"></div>
    </div>

    <script>
        let token = localStorage.getItem('admin_token') || '';
        let selectedFiles = [];
        const API_BASE = 'http://localhost:8280/api/v1';

        // Check if already logged in
        if (token) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'block';
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernameOrEmail: email, password })
                });

                const data = await response.json();
                
                if (data.success || data.accessToken) {
                    token = data.accessToken || data.data?.accessToken;
                    localStorage.setItem('admin_token', token);
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('uploadSection').style.display = 'block';
                    showResult('Login successful!', 'success');
                } else {
                    showResult('Login failed: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (error) {
                showResult('Login error: ' + error.message, 'error');
            }
        }

        function logout() {
            token = '';
            localStorage.removeItem('admin_token');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('uploadSection').style.display = 'none';
            selectedFiles = [];
            document.getElementById('fileList').innerHTML = '';
        }

        // Drag & Drop
        const dropZone = document.getElementById('dropZone');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        }, false);

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            displayFileList();
            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0;
        }

        function displayFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    fileItem.innerHTML = `
                        <div style="display: flex; align-items: center; flex: 1;">
                            <img src="${e.target.result}" alt="${file.name}">
                            <span>${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
                        </div>
                        <button onclick="removeFile(${index})" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">✕</button>
                    `;
                };
                reader.readAsDataURL(file);
                
                fileList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            displayFileList();
            document.getElementById('uploadBtn').disabled = selectedFiles.length === 0;
        }

        async function uploadFiles() {
            if (selectedFiles.length === 0) return;

            const category = document.getElementById('category').value;
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ Uploading...';

            try {
                const uploadedPaths = [];

                for (const file of selectedFiles) {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('category', category);

                    const response = await fetch(`${API_BASE}/admin/upload`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    const data = await response.json();
                    
                    if (data.success) {
                        uploadedPaths.push(data.data);
                    } else {
                        throw new Error(data.message || 'Upload failed');
                    }
                }

                showResult(`✅ Successfully uploaded ${uploadedPaths.length} file(s)!`, 'success');
                displayUploadedImages(uploadedPaths);
                
                // Reset
                selectedFiles = [];
                document.getElementById('fileList').innerHTML = '';
                document.getElementById('fileInput').value = '';

            } catch (error) {
                showResult('❌ Upload error: ' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '⬆️ Upload Files';
            }
        }

        function displayUploadedImages(paths) {
            const container = document.getElementById('uploadedImages');
            container.innerHTML = '<h3>Uploaded Images:</h3>';
            
            paths.forEach(item => {
                const div = document.createElement('div');
                div.className = 'uploaded-image';
                div.innerHTML = `
                    <img src="${API_BASE}/files${item.filePath}" alt="${item.fileName}">
                    <div>
                        <pre>${item.filePath}</pre>
                        <button class="copy-btn" onclick="copyToClipboard('${item.filePath}')">📋 Copy Path</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showResult('✅ Path copied to clipboard!', 'success');
            setTimeout(() => document.getElementById('result').style.display = 'none', 2000);
        }

        function showResult(message, type) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.className = `result ${type}`;
            result.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => result.style.display = 'none', 5000);
            }
        }
    </script>
</body>
</html>
