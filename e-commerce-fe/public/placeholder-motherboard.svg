  <rect x="50" y="50" width="300" height="300" rx="8" fill="#1e40af"/>
  <!-- CPU socket -->
  <rect x="120" y="120" width="80" height="80" fill="#374151"/>
  <!-- RAM slots -->
  <rect x="220" y="100" width="15" height="80" fill="#000000"/>
  <rect x="240" y="100" width="15" height="80" fill="#000000"/>
  <rect x="260" y="100" width="15" height="80" fill="#000000"/>
  <rect x="280" y="100" width="15" height="80" fill="#000000"/>
  <!-- PCIe slots -->
  <rect x="80" y="230" width="200" height="8" fill="#000000"/>
  <rect x="80" y="250" width="200" height="8" fill="#000000"/>
  <rect x="80" y="270" width="200" height="8" fill="#000000"/>
